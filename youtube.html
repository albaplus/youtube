<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;--surface:#212121;--hover:#272727;
  --border:#3f3f3f;--text:#fff;--muted:#aaaaaa;
  --accent:#ff0000;--accent2:#cc0000;
  --font:'Roboto',sans-serif;
  --sidebar-w:240px;--sidebar-mini:72px;
  --topbar-h:56px;
}
html{scrollbar-width:thin;scrollbar-color:#717171 transparent}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#717171;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#999}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;font-size:14px}

/* ── TOPBAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:var(--bg);
  display:flex;align-items:center;padding:0 16px;z-index:300;gap:0;
}
.topbar-left{display:flex;align-items:center;gap:4px;min-width:var(--sidebar-w);padding-right:8px}
.hamburger{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;border:none;background:none;color:var(--text);
  flex-shrink:0;
}
.hamburger:hover{background:rgba(255,255,255,0.1)}
.logo{display:flex;align-items:center;gap:1px;cursor:pointer;text-decoration:none;padding:0 14px 0 6px;user-select:none}
.logo svg{display:block}
.logo-tld{font-size:10px;font-weight:400;color:var(--muted);margin-top:-8px;margin-left:2px;letter-spacing:0.3px}

/* ── SEARCH CENTER ── */
.search-bar{
  flex:1;max-width:728px;display:flex;align-items:center;
  margin:0 auto;height:40px;
}
.search-input-wrap{
  flex:1;display:flex;align-items:center;
  background:transparent;border:1px solid #303030;
  border-right:none;border-radius:40px 0 0 40px;
  height:100%;overflow:hidden;
  transition:border-color 0.15s;
}
.search-input-wrap:focus-within{border-color:#1c62b9;background:#000}
.search-input{
  flex:1;background:transparent;border:none;
  color:var(--text);padding:0 16px;height:100%;
  font-family:var(--font);font-size:16px;outline:none;
  min-width:0;
}
.search-input::placeholder{color:#717171;font-size:16px}
.search-btn{
  width:64px;height:40px;background:#222222;
  border:1px solid #303030;border-left:none;
  border-radius:0 40px 40px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);flex-shrink:0;
}
.search-btn:hover{background:#3d3d3d}
.search-btn:active{background:#555}
.mic-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;border:none;background:#222222;
  color:var(--text);margin-left:8px;flex-shrink:0;
}
.mic-btn:hover{background:#3d3d3d}

/* ── TOPBAR RIGHT ── */
.topbar-right{display:flex;align-items:center;gap:4px;margin-left:8px}
.icon-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;border:none;background:none;color:var(--text);
  position:relative;flex-shrink:0;
}
.icon-btn:hover{background:rgba(255,255,255,0.1)}
.notif-dot{
  position:absolute;top:6px;right:6px;
  width:8px;height:8px;border-radius:50%;
  background:#ff0000;border:2px solid var(--bg);
  pointer-events:none;
}
.avatar-btn{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#6c63ff,#ff6584);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;color:#fff;overflow:hidden;
  margin-left:4px;
}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;left:0;top:var(--topbar-h);
  width:var(--sidebar-w);height:calc(100vh - var(--topbar-h));
  background:var(--bg);overflow-y:auto;overflow-x:hidden;
  padding:12px 0;z-index:200;
  transition:transform 0.2s cubic-bezier(0.4,0,0.2,1),
             width 0.2s cubic-bezier(0.4,0,0.2,1);
  scrollbar-width:none;
}
#sidebar::-webkit-scrollbar{display:none}
#sidebar.mini{width:var(--sidebar-mini)}
#sidebar.mini .sidebar-label{display:none}
#sidebar.mini .sidebar-heading{display:none}
#sidebar.mini .sidebar-divider{margin:8px 4px}
#sidebar.mini .sidebar-item{
  flex-direction:column;justify-content:center;gap:4px;
  padding:0;height:64px;margin:0 4px;border-radius:12px;
}
#sidebar.mini .sidebar-item .icon{min-width:unset}
#sidebar.mini .sidebar-channel{display:none}
.sidebar-section{padding:4px 0}
.sidebar-divider{border:none;border-top:1px solid #272727;margin:8px 0}
.sidebar-heading{
  padding:8px 24px 4px;font-size:13px;font-weight:500;
  color:var(--text);letter-spacing:0;margin-bottom:4px;
}
.sidebar-item{
  display:flex;align-items:center;gap:24px;padding:0 24px;height:40px;
  cursor:pointer;border-radius:10px;margin:0 8px;
  font-size:14px;font-weight:400;color:var(--text);text-decoration:none;
  transition:background 0.1s;user-select:none;
}
.sidebar-item:hover{background:rgba(255,255,255,0.1)}
.sidebar-item.active{background:rgba(255,255,255,0.1);font-weight:500}
.sidebar-item .icon{
  font-size:20px;min-width:24px;text-align:center;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sidebar-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-channel{
  display:flex;align-items:center;gap:16px;padding:0 16px;height:40px;
  cursor:pointer;border-radius:10px;margin:0 8px;transition:background 0.1s;
}
.sidebar-channel:hover{background:rgba(255,255,255,0.1)}
.sidebar-channel .ch-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MAIN CONTENT ── */
#content{
  margin-left:var(--sidebar-w);margin-top:var(--topbar-h);
  padding:0;transition:margin-left 0.2s cubic-bezier(0.4,0,0.2,1);
  min-height:calc(100vh - var(--topbar-h));
}
#content.mini-content{margin-left:var(--sidebar-mini)}
#content.expanded{margin-left:0}

/* ── CHIPS ── */
.chips-bar{
  display:flex;gap:12px;overflow-x:auto;
  padding:12px 24px 8px;scrollbar-width:none;
  position:sticky;top:var(--topbar-h);z-index:10;
  background:var(--bg);
}
.chips-bar::-webkit-scrollbar{display:none}
.chip{
  background:#272727;color:var(--text);border:none;
  padding:6px 14px;border-radius:8px;font-size:14px;font-family:var(--font);
  cursor:pointer;white-space:nowrap;transition:background 0.1s;
  height:32px;display:inline-flex;align-items:center;
  font-weight:400;
}
.chip:hover{background:#3f3f3f}
.chip.active{background:var(--text);color:#0f0f0f;font-weight:500}

/* ── VIDEO GRID ── */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;padding:0 24px 24px;
}
.video-card{cursor:pointer;position:relative}
.video-card:hover .vthumb-inner{border-radius:0}
.video-card:hover .vc-menu{opacity:1}
.vc-menu{
  position:absolute;top:10px;right:8px;
  opacity:0;transition:opacity 0.15s;z-index:5;
}
.vc-menu-btn{
  width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.8);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.vc-menu-btn:hover{background:rgba(0,0,0,0.95)}
.video-thumbnail{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;position:relative}
.vthumb-inner{
  width:100%;height:100%;transition:border-radius 0.2s ease;
  position:relative;border-radius:12px;overflow:hidden;
}
.vthumb-inner img{width:100%;height:100%;object-fit:cover;display:block}
.duration-badge{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,0.8);color:#fff;
  font-size:12px;font-weight:500;padding:3px 6px;
  border-radius:4px;letter-spacing:0.3px;z-index:2;
}
.video-info{display:flex;gap:12px;padding:10px 0 8px}
.card-meta{flex:1;min-width:0}
.card-title{
  font-size:14px;font-weight:500;line-height:1.4;
  color:var(--text);display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;margin-bottom:6px;
}
.card-channel{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:2px}
.card-stats{font-size:13px;color:var(--muted)}
.verified-badge{display:inline-flex;align-items:center;justify-content:center}

/* ── VIDEO PLAYER ── */
#player-view{display:none}
.player-layout{
  display:grid;grid-template-columns:1fr 402px;
  gap:24px;padding:24px;max-width:1900px;
}
@media(max-width:1280px){
  .player-layout{grid-template-columns:1fr}
  .sidebar-panel{display:none}
}
.player-main{min-width:0}
.player-wrap{
  width:100%;aspect-ratio:16/9;background:#000;
  border-radius:12px;overflow:hidden;position:relative;
}
.player-wrap iframe{width:100%;height:100%;border:none}
.player-sim{
  width:100%;height:100%;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.play-overlay{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;background:rgba(0,0,0,0.25);
  opacity:0;transition:opacity 0.2s;
}
.play-overlay.paused{opacity:1}
.play-btn-big{
  width:72px;height:72px;border-radius:50%;
  background:rgba(0,0,0,0.65);border:none;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.player-title{font-size:20px;font-weight:700;line-height:1.4;margin:16px 0 8px}
.player-meta{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:12px;
  padding-bottom:12px;border-bottom:1px solid #272727;
}
.player-views-full{font-size:14px;font-weight:400;color:var(--text)}
.player-date{font-size:13px;color:var(--muted);margin-top:2px}
.player-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.action-btn{
  display:flex;align-items:center;gap:6px;
  background:#272727;border:none;color:var(--text);
  padding:0 16px;border-radius:20px;
  font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;transition:background 0.1s;white-space:nowrap;
  height:36px;
}
.action-btn:hover{background:#3f3f3f}
.action-btn:active{background:#505050}
/* Like/dislike */
.like-dislike-wrap{
  display:flex;align-items:center;
  background:#272727;border-radius:20px;overflow:hidden;
}
.like-half,.dislike-half{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;border:none;background:none;color:var(--text);
  font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;transition:background 0.1s;height:36px;
}
.like-half:hover,.dislike-half:hover{background:#3f3f3f}
.like-half.liked{color:#4e9fff}
.like-half.liked svg path{fill:#4e9fff}
.ld-divider{width:1px;height:20px;background:#3f3f3f}
.channel-row{
  display:flex;align-items:center;gap:16px;padding:16px 0;
  border-bottom:1px solid #272727;margin-bottom:16px;
}
.channel-row .cr-name{font-size:16px;font-weight:600;cursor:pointer}
.channel-row .cr-name:hover{color:var(--muted)}
.channel-row .cr-subs{font-size:13px;color:var(--muted)}
.btn-sub{
  padding:0 18px;height:36px;border-radius:18px;border:none;
  background:var(--text);color:#0f0f0f;
  font-family:var(--font);font-weight:500;font-size:14px;
  cursor:pointer;transition:background 0.1s;white-space:nowrap;
}
.btn-sub:hover{background:#e8e8e8}
.btn-sub.subbed{background:#272727;color:var(--text)}
.btn-sub.subbed:hover{background:#3f3f3f}
.description-box{
  background:#272727;border-radius:12px;padding:12px 16px;
  font-size:14px;line-height:1.6;color:var(--text);cursor:pointer;
}
.description-box:hover{background:#3f3f3f}
.desc-short{
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.comments-section{margin-top:24px}
.comments-title{font-size:16px;font-weight:400;margin-bottom:20px}
.comment{display:flex;gap:16px;margin-bottom:24px}
.comment-body .user{font-size:13px;font-weight:500;margin-bottom:4px}
.comment-body .ts{font-size:12px;color:var(--muted);margin-left:8px;font-weight:400}
.comment-body .text{font-size:14px;line-height:1.5;color:var(--text)}
.comment-actions{display:flex;align-items:center;gap:4px;margin-top:8px}
.comment-like{
  background:none;border:none;color:var(--muted);font-size:13px;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:20px;height:32px;
}
.comment-like:hover{background:rgba(255,255,255,0.1)}
/* Up next */
.up-next-title{font-size:16px;font-weight:500;margin-bottom:12px}
.mini-card{
  display:flex;gap:8px;cursor:pointer;
  padding:4px;border-radius:8px;
  transition:background 0.1s;margin-bottom:4px;
}
.mini-card:hover{background:rgba(255,255,255,0.1)}
.mini-thumb{width:168px;min-width:168px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;position:relative}
.mini-thumb img{width:100%;height:100%;object-fit:cover}
.mini-meta{flex:1;min-width:0}
.mini-title{
  font-size:14px;font-weight:500;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;
}
.mini-channel{font-size:13px;color:var(--muted);margin-bottom:2px}
.mini-stats{font-size:12px;color:var(--muted)}

/* ── CHANNEL PAGE ── */
#channel-view{display:none}
.ch-banner{
  width:100%;height:130px;overflow:hidden;
  position:relative;background:#111;
}
@media(min-width:1200px){.ch-banner{height:190px}}
.ch-banner img{width:100%;height:100%;object-fit:cover}
.ch-info-row{
  display:flex;align-items:center;gap:24px;
  padding:16px 24px;flex-wrap:wrap;
}
.ch-big-avatar{
  width:80px;height:80px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
}
@media(min-width:900px){.ch-big-avatar{width:120px;height:120px}}
.ch-big-avatar img{width:100%;height:100%;object-fit:cover}
.ch-details{flex:1;min-width:0}
.ch-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ch-big-name{font-size:20px;font-weight:700}
@media(min-width:900px){.ch-big-name{font-size:24px}}
.ch-handle{font-size:14px;color:var(--muted)}
.ch-stats-row{font-size:13px;color:var(--muted);margin-top:6px}
.ch-tabs{
  display:flex;border-bottom:1px solid #272727;
  padding:0 24px;overflow-x:auto;scrollbar-width:none;
}
.ch-tabs::-webkit-scrollbar{display:none}
.ch-tab{
  padding:0 20px;height:48px;background:none;border:none;
  color:#aaaaaa;font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color 0.1s;white-space:nowrap;
}
.ch-tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.ch-tab.active{color:var(--text);border-bottom-color:var(--text)}
.ch-content{padding:24px}
.section-heading{font-size:16px;font-weight:500;margin:0 0 16px}
.section-block{margin-bottom:40px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#212121;border-radius:12px;padding:16px;text-align:center}
.stat-value{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted)}
.playlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.playlist-card{
  cursor:pointer;border-radius:12px;overflow:hidden;
  background:#212121;transition:background 0.1s;
}
.playlist-card:hover{background:#2e2e2e}
.playlist-thumb-wrap{position:relative}
.playlist-count{
  position:absolute;bottom:0;right:0;
  background:rgba(0,0,0,0.8);padding:4px 10px;
  font-size:13px;display:flex;align-items:center;gap:6px;
  border-radius:0 0 0 6px;
}
.playlist-info{padding:12px}
.playlist-name{font-weight:500;font-size:14px;margin-bottom:4px}
.playlist-meta{font-size:13px;color:var(--muted)}
.about-content{max-width:600px}
.about-desc{font-size:15px;line-height:1.7;color:var(--muted);margin-bottom:24px}
.about-row{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  font-size:14px;color:var(--muted);
}
.about-row .icon{font-size:18px;width:24px;text-align:center}
.monetize-card{
  background:linear-gradient(135deg,#1a2a1a,#2a3a2a);
  border:1px solid #3a5a3a;border-radius:16px;padding:20px;margin-bottom:24px;
}
.monetize-title{font-size:16px;font-weight:500;color:#6fcf97;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.earn-item{background:rgba(0,0,0,0.3);border-radius:10px;padding:14px;text-align:center}
.earn-val{font-size:22px;font-weight:700;color:#6fcf97}
.earn-lbl{font-size:12px;color:#aaa;margin-top:2px}

/* ── LIVE BADGE ── */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#cc0000;color:#fff;font-size:12px;font-weight:700;
  padding:3px 8px;border-radius:3px;letter-spacing:0.5px;text-transform:uppercase;
}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.5}}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:livePulse 1.5s infinite}
.live-viewers{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.live-viewers-count{color:var(--text);font-weight:500}

/* ── LIVE VIEW ── */
#live-view{display:none}
.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:0 24px 24px}
.live-card{cursor:pointer;border-radius:12px;overflow:hidden;transition:transform 0.15s}
.live-card:hover{transform:translateY(-2px)}
.live-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#111;border-radius:12px}
.live-thumb img{width:100%;height:100%;object-fit:cover}
.live-thumb-gradient{width:100%;height:100%}
.live-badge-wrap{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:8px}
.live-info{padding:10px 4px 0}
.live-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.3}
.live-channel-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}

/* ── VIEW COUNT ANIMATION ── */
@keyframes viewFlash{0%{color:var(--text)}50%{color:#4caf50}100%{color:var(--text)}}
.views-tick{animation:viewFlash 0.6s ease}

/* ── NOTIFICATIONS TOAST ── */
.notif{
  position:fixed;bottom:24px;right:24px;
  background:#272727;color:#fff;padding:12px 20px;
  border-radius:4px;font-size:14px;z-index:9999;
  opacity:0;transform:translateY(8px);
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;min-width:200px;
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
}
.notif.show{opacity:1;transform:translateY(0)}

/* ── LIVE METRICS ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.metric-live{animation:pulse 2s infinite}
.trend-up{color:#4caf50;font-size:12px}

/* ── SEARCH RESULTS ── */
#search-view{display:none}
.search-result{
  display:flex;gap:16px;margin-bottom:20px;
  cursor:pointer;padding:4px;border-radius:8px;
}
.search-result:hover{background:rgba(255,255,255,0.05)}
.sr-thumb{
  width:360px;min-width:360px;aspect-ratio:16/9;
  border-radius:12px;overflow:hidden;position:relative;flex-shrink:0;
}
@media(max-width:900px){.sr-thumb{width:200px;min-width:200px}}
.sr-thumb img{width:100%;height:100%;object-fit:cover}
.sr-meta{flex:1}
.sr-title{font-size:18px;font-weight:400;margin-bottom:8px;line-height:1.3}
.sr-stats{font-size:13px;color:var(--muted);margin-bottom:8px}
.sr-channel-row{display:flex;align-items:center;gap:8px}
.sr-channel-name{font-size:13px;color:var(--muted)}
.sr-desc{font-size:14px;color:var(--muted);margin-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{
  background:linear-gradient(90deg,#1c1c1c 25%,#2a2a2a 37%,#1c1c1c 63%);
  background-size:800px 100%;animation:shimmer 1.6s ease infinite;
}

/* ── CONTENT SCROLLBAR ── */
#content{scrollbar-width:thin;scrollbar-color:#3f3f3f transparent}

/* ── SVG ICONS ── */
.icon-svg{display:flex;align-items:center;justify-content:center}
svg.yt-icon{fill:var(--text);width:24px;height:24px;flex-shrink:0}

/* ── FOCUS VISIBLE ── */
*:focus-visible{outline:2px solid #3ea6ff;outline-offset:2px;border-radius:4px}

/* ── TYPE BADGES ── */
.type-badge{
  position:absolute;top:8px;left:8px;z-index:3;
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:4px;
  font-size:11px;font-weight:700;letter-spacing:0.5px;
  pointer-events:none;
}
.type-badge.music{background:rgba(139,92,246,0.9);color:#fff}
.type-badge.film{background:rgba(239,68,68,0.9);color:#fff}
.type-badge.short{background:rgba(234,179,8,0.9);color:#000}
.type-badge.live{background:#ff0000;color:#fff}

/* ── EXPLORE VIEW ── */
#explore-view{display:none}
.explore-tabs-bar{
  display:flex;gap:0;padding:0 24px;
  border-bottom:1px solid #272727;
  position:sticky;top:var(--topbar-h);z-index:10;
  background:var(--bg);overflow-x:auto;scrollbar-width:none;
}
.explore-tabs-bar::-webkit-scrollbar{display:none}
.explore-tab{
  padding:14px 20px;border:none;background:none;
  color:var(--muted);font-family:var(--font);font-size:14px;font-weight:500;
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
  transition:color 0.15s,border-color 0.15s;
}
.explore-tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.explore-tab.active{color:var(--text);border-bottom-color:var(--text)}
.explore-content{padding:24px}

/* ── MUSIC CARDS ── */
.music-list{display:flex;flex-direction:column;gap:4px}
.music-row{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px;border-radius:8px;cursor:pointer;
  transition:background 0.1s;position:relative;
}
.music-row:hover{background:rgba(255,255,255,0.07)}
.music-rank{
  width:24px;text-align:center;font-size:14px;font-weight:500;
  color:var(--muted);flex-shrink:0;
}
.music-thumb{
  width:52px;height:52px;border-radius:6px;overflow:hidden;
  flex-shrink:0;position:relative;
}
.music-thumb img{width:100%;height:100%;object-fit:cover}
.music-info{flex:1;min-width:0}
.music-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-artist{font-size:13px;color:var(--muted);margin-top:2px}
.music-stats{font-size:12px;color:var(--muted);flex-shrink:0;text-align:right}
.music-play-btn{
  width:32px;height:32px;border-radius:50%;background:var(--text);
  border:none;color:#000;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;opacity:0;transition:opacity 0.15s;
}
.music-row:hover .music-play-btn{opacity:1}
.music-bars{display:flex;align-items:flex-end;gap:2px;height:18px;margin-right:4px}
.music-bars span{width:3px;background:var(--accent);border-radius:2px;animation:musicBar 0.8s ease infinite}
.music-bars span:nth-child(1){height:8px;animation-delay:0s}
.music-bars span:nth-child(2){height:14px;animation-delay:0.15s}
.music-bars span:nth-child(3){height:10px;animation-delay:0.3s}
.music-bars span:nth-child(4){height:6px;animation-delay:0.45s}
@keyframes musicBar{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}

/* ── MUSIC GRID ── */
.music-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;
}
.music-album-card{cursor:pointer;border-radius:8px;overflow:hidden;transition:transform 0.15s}
.music-album-card:hover{transform:translateY(-2px)}
.music-album-art{width:100%;aspect-ratio:1/1;border-radius:8px;overflow:hidden;position:relative;margin-bottom:10px}
.music-album-art img{width:100%;height:100%;object-fit:cover}
.music-album-name{font-size:14px;font-weight:500;margin-bottom:3px}
.music-album-sub{font-size:13px;color:var(--muted)}

/* ── FILM CARDS ── */
.film-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
}
.film-card{cursor:pointer;transition:transform 0.15s}
.film-card:hover{transform:translateY(-3px)}
.film-poster{
  width:100%;aspect-ratio:2/3;border-radius:10px;overflow:hidden;
  position:relative;margin-bottom:8px;background:#111;
}
.film-poster img{width:100%;height:100%;object-fit:cover;display:block}
.film-rating-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,0.75);color:#f9ca24;
  font-size:11px;font-weight:700;padding:3px 6px;
  border-radius:4px;display:flex;align-items:center;gap:3px;
}
.film-title{font-size:13px;font-weight:500;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:3px;}
.film-meta{font-size:12px;color:var(--muted)}
.film-genre-badge{
  display:inline-block;background:#272727;border-radius:4px;
  padding:2px 7px;font-size:11px;color:var(--muted);margin-right:4px;
}

/* ── SHORTS EXPLORE GRID ── */
.shorts-explore-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}
.short-card{cursor:pointer;position:relative}
.short-card:hover .short-thumb{transform:scale(1.03)}
.short-thumb{
  width:100%;aspect-ratio:9/16;border-radius:10px;
  overflow:hidden;background:#111;transition:transform 0.2s;
  position:relative;
}
.short-thumb img{width:100%;height:100%;object-fit:cover}
.short-info{padding:6px 0}
.short-title{font-size:13px;font-weight:500;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.short-stats{font-size:12px;color:var(--muted);margin-top:2px}

/* ── TRENDING SECTION ── */
.trending-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.trending-header h2{font-size:18px;font-weight:700}
.trending-section{margin-bottom:32px}
.trending-video-row{
  display:flex;gap:16px;cursor:pointer;
  padding:6px;border-radius:8px;transition:background 0.1s;
  align-items:flex-start;
}
.trending-video-row:hover{background:rgba(255,255,255,0.05)}
.trending-rank{
  font-size:24px;font-weight:700;color:var(--muted);
  min-width:36px;text-align:center;padding-top:4px;flex-shrink:0;
}
.trending-thumb{
  width:180px;min-width:180px;aspect-ratio:16/9;
  border-radius:8px;overflow:hidden;position:relative;flex-shrink:0;
}
.trending-thumb img{width:100%;height:100%;object-fit:cover}
.trending-meta{flex:1}
.trending-title{font-size:15px;font-weight:500;margin-bottom:6px;line-height:1.3}
.trending-channel{font-size:13px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.trending-stats{font-size:13px;color:var(--muted)}

/* ── EXPLORE HEADING ── */
.explore-section-title{
  font-size:18px;font-weight:700;margin-bottom:16px;margin-top:8px;
  display:flex;align-items:center;gap:8px;
}
</style>

let STATE = {view:'home',currentChannel:null,currentVideo:null,currentTab:'home',sidebarOpen:true,currentChip:'all'};

async function loadDB(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/albaplus/youtube/refs/heads/main/database.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    DB=await res.json();
    saveDB();
  }catch(e){
    console.warn('Falha ao carregar JSON remoto, usando cache local:',e);
    try{const s=localStorage.getItem('vidstream_db2');if(s){DB=JSON.parse(s);return;}}catch(_){}
    DB=JSON.parse(JSON.stringify(DEFAULT_DB));
    saveDB();
  }
  navigate('home');
}
function saveDB(){
  try{localStorage.setItem('vidstream_db2',JSON.stringify(DB));}catch(e){}
}

// ══════════════════════════════════════════════
// METRICS TICK SYSTEM
// ══════════════════════════════════════════════
let tickCount=0;
function tick(){
  tickCount++;
  const now=Date.now();
  DB.videos.forEach(v=>{
    const vel=v.engagement.velocity;
    const factor=v.engagement.trend==='viral'?3:v.engagement.trend==='growing'?1.5:1;
    const addViews=Math.floor(10*vel*factor*(0.8+Math.random()*0.4));
    const addLikes=Math.floor(addViews*v.engagement.like_ratio*(0.9+Math.random()*0.2));
    v.views+=addViews;v.likes+=addLikes;
    if(Math.random()<0.002&&v.engagement.trend!=='viral'){
      v.engagement.trend='viral';v.engagement.velocity=Math.min(v.engagement.velocity*1.5,5);
      showNotif(`🔥 "${v.title}" está viralizando!`);
    }
    DB.logs.push({video_id:v.id,timestamp:now,views_added:addViews,likes_added:addLikes});
  });
  // Tick music
  (DB.music||[]).forEach(m=>{
    const vel=m.engagement.velocity;
    const factor=m.engagement.trend==='viral'?3:m.engagement.trend==='growing'?1.5:1;
    m.views+=Math.floor(25*vel*factor*(0.8+Math.random()*0.4));
    m.likes+=Math.floor(m.views*0.0001*(0.8+Math.random()*0.4));
  });
  // Tick films
  (DB.films||[]).forEach(f=>{
    const vel=f.engagement.velocity;
    const factor=f.engagement.trend==='viral'?2:1.2;
    f.views+=Math.floor(5*vel*factor*(0.8+Math.random()*0.4));
  });
  // Live viewer fluctuation
  if(DB.live_streams){
    DB.live_streams.forEach(ls=>{
      const delta=Math.floor((Math.random()-0.4)*50);
      ls.viewers=Math.max(100,ls.viewers+delta);
    });
  }
  DB.channels.forEach(ch=>{
    if(Math.random()<0.1) ch.subscribers+=Math.floor(Math.random()*3);
  });
  if(DB.logs.length>500) DB.logs=DB.logs.slice(-200);
  saveDB();
  // Update live UI
  if(STATE.view==='player'&&STATE.currentVideo){
    const v=getVideo(STATE.currentVideo);
    if(v){
      const el=document.getElementById('player-views-full');
      if(el){
        el.textContent=fmtNumFull(v.views)+' visualizações';
        el.classList.remove('views-tick');
        void el.offsetWidth;
        el.classList.add('views-tick');
      }
      const acts=document.getElementById('player-actions');
      if(acts){const lb=acts.querySelector('.like-count');if(lb)lb.textContent=fmtNum(v.likes);}
    }
  }
  if(STATE.view==='channel'&&STATE.currentChannel){
    const el=document.getElementById('ch-stats-row');
    const ch=getChannel(STATE.currentChannel);
    if(el&&ch) el.textContent=`${fmtNum(ch.subscribers)} inscritos`;
  }
  if(STATE.view==='live'){
    renderLiveGrid();
  }
}
setInterval(tick,5000);

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getVideo(id){
  let v=DB.videos.find(v=>v.id===id);
  if(!v) v=(DB.music||[]).find(m=>m.id===id);
  if(!v) v=(DB.films||[]).find(f=>f.id===id);
  return v;
}
function getChannel(id){return DB.channels.find(c=>c.id===id)}
function getChannelVideos(chId){return DB.videos.filter(v=>v.channel_id===chId)}
function fmtNum(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(0)+'K';
  return n.toString();
}
function fmtNumFull(n){
  return n.toLocaleString('pt-BR');
}
function fmtDate(d){
  const diff=Math.floor((Date.now()-new Date(d).getTime())/86400000);
  if(diff<1)return'hoje';if(diff<7)return`há ${diff} dias`;
  if(diff<30)return`há ${Math.floor(diff/7)} semanas`;
  if(diff<365)return`há ${Math.floor(diff/30)} meses`;
  return`há ${Math.floor(diff/365)} anos`;
}
function gradientCSS(g){return`linear-gradient(135deg,${g.join(',')})`}

// Verified badge SVG (YouTube style)
function verifiedSVG(size=16){
  return`<svg width="${size}" height="${size}" viewBox="0 0 24 24" style="fill:#aaa;vertical-align:middle;margin-left:3px" title="Canal verificado"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
}

function makeAvatar(chId,size=36){
  const ch=getChannel(chId);
  if(!ch)return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:#333;flex-shrink:0"></div>`;
  if(ch.avatar_url){
    return`<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0;cursor:pointer" onclick="navigate('channel','${chId}')"><img src="${ch.avatar_url}" style="width:100%;height:100%;object-fit:cover" loading="lazy" onerror="this.parentNode.innerHTML='<div style=\'width:${size}px;height:${size}px;border-radius:50%;background:${gradientCSS(ch.gradient||['#333','#555'])};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*0.4)}px;font-weight:700;color:#fff\'>${ch.name[0].toUpperCase()}</div>'"></div>`;
  }
  const initials=ch.name.substring(0,1).toUpperCase();
  const g=ch.gradient||['#333','#555'];
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${gradientCSS(g)};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*0.4)}px;font-weight:700;flex-shrink:0;cursor:pointer;color:#fff" onclick="navigate('channel','${chId}')">${initials}</div>`;
}

function makeThumbnail(video){
  if(video.thumbnail_url){
    return`<div class="vthumb-inner" style="position:relative">
      <img src="${video.thumbnail_url}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;width:100%;height:100%;background:${gradientCSS(video.gradient||['#111','#222'])};align-items:center;justify-content:center;padding:16px;text-align:center;position:absolute;inset:0">

  return`<div class="vthumb-inner" style="background:${gradientCSS(video.gradient||['#111','#222'])};display:flex;align-items:center;justify-content:center;padding:16px;text-align:center">

function showNotif(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),3500);
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function navigate(view,id){
  ['home-view','player-view','channel-view','search-view','live-view','explore-view'].forEach(v=>{
    document.getElementById(v).style.display='none';
  });
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  STATE.view=view;
  if(view==='home'){
    document.getElementById('home-view').style.display='block';
    document.getElementById('si-home').classList.add('active');
    renderHome();
  } else if(view==='player'){
    STATE.currentVideo=id;
    document.getElementById('player-view').style.display='block';
    renderPlayer(id);
    window.scrollTo(0,0);
  } else if(view==='channel'){
    STATE.currentChannel=id;
    STATE.currentTab='home';
    document.getElementById('channel-view').style.display='block';
    renderChannel(id);
    window.scrollTo(0,0);
  } else if(view==='search'){
    document.getElementById('search-view').style.display='block';
    renderSearch(id);
  } else if(view==='live'){
    document.getElementById('live-view').style.display='block';
    document.getElementById('si-live').classList.add('active');
    renderLiveGrid();
    window.scrollTo(0,0);
  } else if(view==='explore'){
    document.getElementById('explore-view').style.display='block';
    if(document.getElementById('si-explore')) document.getElementById('si-explore').classList.add('active');
    STATE.exploreTab=id||'trending';
    renderExplore(STATE.exploreTab);
    window.scrollTo(0,0);
  }
}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const c=document.getElementById('content');
  // Cycle: full → mini → full
  if(s.classList.contains('mini')){
    s.classList.remove('mini');
    c.classList.remove('mini-content');
    c.classList.remove('expanded');
    STATE.sidebarOpen=true;
  } else {
    s.classList.add('mini');
    c.classList.add('mini-content');
    c.classList.remove('expanded');
    STATE.sidebarOpen=false;
  }
}

// HOME
// ══════════════════════════════════════════════
function renderHome(){
  renderChips();
  const grid=document.getElementById('video-grid');
  let items=[];
  if(STATE.currentChip==='all'){
    items=[...DB.videos];
    const shorts=(DB.shorts||[]).slice(0,4);
    shorts.forEach((s,i)=>items.splice(Math.min(6+i*4,items.length),0,{...s,_type:'short'}));
    const musics=(DB.music||[]).slice(0,3);
    musics.forEach((m,i)=>items.splice(Math.min(8+i*5,items.length),0,{...m,_type:'music'}));
  } else if(STATE.currentChip==='trending'){
    items=DB.trending.map(id=>getVideo(id)).filter(Boolean);
  } else if(STATE.currentChip==='shorts'){
    items=(DB.shorts||[]).map(s=>({...s,_type:'short'}));
  } else if(STATE.currentChip==='music'){
    items=(DB.music||[]).map(m=>({...m,_type:'music'}));
  } else if(STATE.currentChip==='films'){
    items=(DB.films||[]).map(f=>({...f,_type:'film'}));
  } else {
    items=DB.videos.filter(v=>{const ch=getChannel(v.channel_id);return ch&&ch.name.toLowerCase().includes(STATE.currentChip)});
  }
  grid.innerHTML=items.map(v=>{
    if(v._type==='short') return shortHomeCard(v);
    if(v._type==='music') return musicHomeCard(v);
    if(v._type==='film') return filmHomeCard(v);
    return videoCard(v);
  }).join('');
  grid.className='video-grid fade-in';
  renderSidebarChannels();
  const ch1=getChannel('ch_001');
  const ab=document.getElementById('topbar-avatar-btn');
  if(ch1&&ch1.avatar_url){
    ab.innerHTML=`<img src="${ch1.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentNode.textContent='V'">`;
  }
}

function renderChips(){
  const chips=['all','trending','shorts','music','films','venna','lofi','night'];
  const labels={all:'Tudo',trending:'🔥 Trending',shorts:'⚡ Shorts',music:'🎵 Músicas',films:'🎬 Filmes',venna:'venna',lofi:'Lofi',night:'NightWave'};
  document.getElementById('chips').innerHTML=chips.map(c=>`
    <button class="chip${c===STATE.currentChip?' active':''}" onclick="setChip('${c}')">${labels[c]||c}</button>
  `).join('');
}

function setChip(c){STATE.currentChip=c;renderHome();}

let playerState={playing:true,descExpanded:false};

function renderPlayer(vid){
  const v=getVideo(vid);
  if(!v){
    // Check if it's a live stream
    const ls=(DB.live_streams||[]).find(l=>l.id===vid);
    if(ls){renderLivePlayer(ls);return;}
    return;
  }
  const ch=getChannel(v.channel_id);
  v.views+=Math.floor(10+Math.random()*20);
  saveDB();
  // Player wrap — embed or simulated
  const pw=document.getElementById('player-wrap');
  if(v.embed_url){
    pw.innerHTML=`<iframe src="${v.embed_url}?autoplay=1&modestbranding=1&rel=0" allowfullscreen allow="autoplay; encrypted-media" style="width:100%;height:100%;border:none;border-radius:12px"></iframe>`;
  } else {
    pw.innerHTML=`<div class="player-sim" style="background:${gradientCSS(v.gradient||['#000','#111'])}" onclick="togglePlay()">
      <div class="play-overlay${playerState.playing?'':' paused'}" id="play-overlay">
        <button class="play-btn-big">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
        ${v.thumbnail_url
          ? `<img src="${v.thumbnail_url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.4" onerror="this.remove()">`
          : ''
        }
        <div style="position:relative;font-size:32px;font-weight:700;color:rgba(255,255,255,0.18);text-align:center;padding:32px;z-index:1">${v.title}</div>
      </div>
    </div>`;
  }
  // Title
  document.getElementById('player-title').textContent=v.title;
  // Full view count
  document.getElementById('player-views-full').textContent=fmtNumFull(v.views)+' visualizações';
  document.getElementById('player-date').textContent=fmtDate(v.upload_date)+' · '+v.engagement.trend;
  // Actions — YT style
  document.getElementById('player-actions').innerHTML=`

function miniCard(v){
  const ch=getChannel(v.channel_id);
  return`<div class="mini-card" onclick="navigate('player','${v.id}')">
    <div class="mini-thumb">
      ${v.thumbnail_url
        ? `<img src="${v.thumbnail_url}" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`

function togglePlay(){
  playerState.playing=!playerState.playing;
  const o=document.getElementById('play-overlay');
  if(o) o.className=`play-overlay${playerState.playing?'':' paused'}`;
}

function toggleLike(vid){
  const v=getVideo(vid);
  if(!v)return;
  v.liked=!v.liked;
  if(v.liked){v.likes++;showNotif('👍 Você curtiu este vídeo');}
  else{v.likes--;showNotif('Curtida removida');}
  saveDB();
  renderPlayer(vid);
}

function toggleSub(chId){
  const ch=getChannel(chId);
  if(!ch)return;
  ch.subscribed=!ch.subscribed;
  if(ch.subscribed){ch.subscribers++;showNotif(`🔔 Inscrito em ${ch.name}!`);}
  else{ch.subscribers--;showNotif(`Inscrição cancelada em ${ch.name}`);}
  saveDB();
  const btn=document.getElementById('player-sub-btn');
  if(btn){btn.textContent=ch.subscribed?'Inscrito ✓':'Inscrever-se';btn.className=`btn-sub${ch.subscribed?' subbed':''}`;}
  renderSidebarChannels();
}

function toggleDesc(el){
  const inner=el.querySelector('#desc-inner');
  if(!inner)return;
  if(inner.classList.contains('desc-short')){inner.classList.remove('desc-short');}
  else{inner.classList.add('desc-short');}
}

function switchTab(tab){
  STATE.currentTab=tab;
  document.querySelectorAll('.ch-tab').forEach((b,i)=>{
    const tabs=['home','videos','shorts','playlists','live','community','monetize','about'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  renderChannelTab(STATE.currentChannel,tab);
}

function toggleChannelSub(){
  if(STATE.currentChannel) toggleSub(STATE.currentChannel);
  const ch=getChannel(STATE.currentChannel);
  if(ch){
    const btn=document.getElementById('ch-sub-btn');
    btn.textContent=ch.subscribed?'Inscrito ✓':'Inscrever-se';
    btn.className=`btn-sub${ch.subscribed?' subbed':''}`;
    document.getElementById('ch-stats-row').innerHTML=`${fmtNum(ch.subscribers)} inscritos`;

function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q)return;
  navigate('search',q);
}

function renderSearch(q){
  const results=DB.videos.filter(v=>
    v.title.toLowerCase().includes(q)||
    (getChannel(v.channel_id)?.name.toLowerCase().includes(q))
  );
  const el=document.getElementById('search-results');
  if(!results.length){
    el.innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted)">Nenhum resultado para "<strong>${q}</strong>"</div>`;
    return;
  }
  el.innerHTML=`<div style="margin-bottom:16px;font-size:16px;color:var(--muted)">Resultados para "<strong style="color:var(--text)">${q}</strong>"</div>`+
    results.map(v=>{
      const ch=getChannel(v.channel_id);
      return`<div class="search-result" onclick="navigate('player','${v.id}')">
        <div class="sr-thumb">
          ${v.thumbnail_url
            ? `<img src="${v.thumbnail_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
            : `<div style="background:${gradientCSS(v.gradient)};width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px;text-align:center"><span style="font-size:12px;color:rgba(255,255,255,0.5)">${v.title}</span></div>`
          }
          <div class="duration-badge">${v.duration}</div>
        </div>
        <div class="sr-meta">
          <div class="sr-title">${v.title}</div>
          <div class="sr-stats">${fmtNum(v.views)} visualizações · ${fmtDate(v.upload_date)}</div>
          <div class="sr-channel-row">${makeAvatar(v.channel_id,24)}<span class="sr-channel-name">${ch?.name||''}</span></div>
          <div class="sr-desc">${v.description}</div>
        </div>
      </div>`;
    }).join('');
}

// SORT CHANNEL VIDEOS

function sortVideos(by){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  const chVideos=getChannelVideos(STATE.currentChannel);
  let sorted;
  if(by==='popular') sorted=[...chVideos].sort((a,b)=>b.views-a.views);
  else if(by==='oldest') sorted=[...chVideos].sort((a,b)=>a.upload_date.localeCompare(b.upload_date));
  else sorted=[...chVideos].sort((a,b)=>b.upload_date.localeCompare(a.upload_date));
  const grid=document.getElementById('ch-video-grid');
  if(grid) grid.innerHTML=sorted.map(v=>videoCard(v)).join('');
}

function switchExploreTab(tab){
  STATE.exploreTab=tab;
  document.querySelectorAll('.explore-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.tab===tab);
  });
  renderExplore(tab);
}

function renderExplore(tab){
  // Activate tab button
  document.querySelectorAll('.explore-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.tab===tab);
  });
  const el=document.getElementById('explore-content');
  if(!el)return;
  if(tab==='trending') renderExploreTrending(el);
  else if(tab==='shorts') renderExploreShorts(el);
  else if(tab==='music') renderExploreMusic(el);
  else if(tab==='films') renderExploreFilms(el);
  else if(tab==='gaming'){
    el.innerHTML=`<div style="text-align:center;padding:80px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">🎮</div>
